###############################################
# Kallon hub MediaMTX — RTSP remux → HLS
#
# NVR-style buffered HLS: 4s mpegts segments (not LL-HLS). Long playlist
# window + always-on RTSP pull = smooth buyer tiles over lossy WireGuard.
###############################################

logLevel: info
logDestinations: [stdout]

api: yes
apiAddress: 127.0.0.1:9997

hls: yes
hlsAddress: 127.0.0.1:8888
hlsAlwaysRemux: yes
hlsVariant: mpegts
hlsSegmentCount: 10
hlsSegmentDuration: 4s
hlsSegmentMaxSize: 50M
hlsAllowOrigin: '*'

rtsp: no
rtmp: no
webrtc: no
srt: no

paths: {}
