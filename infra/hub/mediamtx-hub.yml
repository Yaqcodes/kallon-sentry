###############################################
# Kallon hub MediaMTX — RTSP remux → HLS
#
# Paths are created on demand by hls_proxy.py via the Control API.
# Balanced buffered HLS: short segments for lower lag, still mpegts
# (not LL-HLS — that + WG loss caused choppy tiles).
###############################################

logLevel: info
logDestinations: [stdout]

# Control API — loopback only (hls_proxy uses this to add paths).
api: yes
apiAddress: 127.0.0.1:9997

# HLS for Artemis via hls_proxy (never bind public).
hls: yes
hlsAddress: 127.0.0.1:8888
hlsAlwaysRemux: yes
# mpegts = classic buffered HLS (not lowLatency).
hlsVariant: mpegts
hlsSegmentCount: 6
hlsSegmentDuration: 2s
hlsSegmentMaxSize: 50M
hlsAllowOrigin: '*'

# No public RTSP relay on the hub (NOC still uses tower :8554 over WG).
rtsp: no
rtmp: no
webrtc: no
srt: no

# Empty — hls_proxy adds {device_id}_camN paths at runtime.
paths: {}
